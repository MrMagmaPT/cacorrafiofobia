<VirtualHost *:80>
    ServerName your-domain.com
    ServerAlias www.your-domain.com

    # Point DocumentRoot directly to Laravel's public/ folder
    DocumentRoot /var/www/cacorrafiofobia/public

    <Directory /var/www/cacorrafiofobia/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/cacorrafiofobia_error.log
    CustomLog ${APACHE_LOG_DIR}/cacorrafiofobia_access.log combined
</VirtualHost>

