<VirtualHost *:80>
    # If you have a domain:      ServerName yourdomain.com
    # If you only have an IP:    ServerName 123.456.789.0
    ServerName 2.80.90.117

    # ServerAlias is only needed if you have a domain and want www. to also work
    # Comment it out or delete it if you're using an IP
    # ServerAlias www.your-domain.com

    # Files live in a subfolder of /var/www/html
    # but Apache only serves the public/ directory — nothing above it is exposed
    DocumentRoot /var/www/html/cacorrafiofobia/public

    <Directory /var/www/html/cacorrafiofobia/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/cacorrafiofobia_error.log
    CustomLog ${APACHE_LOG_DIR}/cacorrafiofobia_access.log combined
</VirtualHost>

